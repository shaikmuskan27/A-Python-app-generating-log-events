<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelliLog - Enterprise Aggregator</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    
    <div id="toastContainer" class="toast-container"></div>

    <div class="layout">
        <aside class="sidebar glass-panel">
            <div class="brand">
                <div class="pulse-indicator"></div>
                <h2>IntelliLog</h2>
            </div>
            <nav>
                <a href="#" class="nav-item active">
                    <i>📊</i> Dashboard
                </a>
                <a href="#" class="nav-item">
                    <i>🔍</i> Search
                </a>
                <a href="#" class="nav-item">
                    <i>⚙️</i> Settings
                </a>
            </nav>
        </aside>

        <div class="main-wrapper">
            <header class="top-header glass-panel">
                <div class="search-bar">
                    <i>🔍</i>
                    <input type="text" id="searchInput" placeholder="Search logs, containers, or services...">
                </div>
                <div class="header-actions">
                    <button id="refreshBtn" class="btn btn-primary">
                        <i>🔄</i> Refresh
                    </button>
                </div>
            </header>

            <main class="content">
                <div class="stats-row">
                    <div class="stat-card glass-panel">
                        <div class="stat-icon">📄</div>
                        <div class="stat-details">
                            <h3>Total Logs</h3>
                            <div class="stat-value" id="totalLogs">0</div>
                        </div>
                    </div>
                    <div class="stat-card glass-panel alert-card">
                        <div class="stat-icon text-danger">⚠️</div>
                        <div class="stat-details">
                            <h3>Error Logs</h3>
                            <div class="stat-value text-danger" id="errorLogs">0</div>
                        </div>
                    </div>
                    <div class="stat-card glass-panel">
                        <div class="stat-icon text-info">ℹ️</div>
                        <div class="stat-details">
                            <h3>Info Logs</h3>
                            <div class="stat-value text-info" id="infoLogs">0</div>
                        </div>
                    </div>
                </div>

                <div class="charts-row">
                    <div class="chart-container glass-panel">
                        <h3>Log Activity (Recent)</h3>
                        <canvas id="volumeChart"></canvas>
                    </div>
                    <div class="chart-container glass-panel">
                        <h3>Severity Distribution</h3>
                        <canvas id="severityChart"></canvas>
                    </div>
                </div>

                <div class="table-card glass-panel">
                    <div class="table-header">
                        <h2>Real-Time Logs</h2>
                        <select id="severityFilter" class="glass-input">
                            <option value="ALL">All Severities</option>
                            <option value="ERROR">Errors Only</option>
                            <option value="INFO">Info Only</option>
                        </select>
                    </div>
                    <div class="table-responsive">
                        <table id="logsTable">
                            <thead>
                                <tr>
                                    <th>Timestamp</th>
                                    <th>Severity</th>
                                    <th>Service Name</th>
                                    <th>Container ID</th>
                                    <th>Message</th>
                                </tr>
                            </thead>
                            <tbody id="logsBody">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                        <div id="loading" class="loading-spinner" style="display: none;"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
