<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligent Log & Alert Aggregator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    
    <div class="container">
        <header class="glass-panel">
            <div class="logo-area">
                <div class="pulse-indicator"></div>
                <h1>Intelligent Log Aggregator</h1>
            </div>
            <div class="actions">
                <button id="refreshBtn" class="btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 21v-5h5"/></svg>
                    Refresh
                </button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card glass-panel">
                <h3>Total Logs</h3>
                <div class="stat-value" id="totalLogs">--</div>
            </div>
            <div class="stat-card glass-panel alert-card">
                <h3>Error Logs</h3>
                <div class="stat-value text-danger" id="errorLogs">--</div>
            </div>
            <div class="stat-card glass-panel">
                <h3>Info Logs</h3>
                <div class="stat-value text-info" id="infoLogs">--</div>
            </div>
        </div>

        <main class="glass-panel main-content">
            <div class="table-header">
                <h2>Real-Time Logs</h2>
                <div class="filters">
                    <select id="severityFilter" class="glass-input">
                        <option value="ALL">All Severities</option>
                        <option value="ERROR">Errors Only</option>
                        <option value="INFO">Info Only</option>
                    </select>
                </div>
            </div>
            
            <div class="table-container">
                <table id="logsTable">
                    <thead>
                        <tr>
                            <th>Timestamp</th>
                            <th>Severity</th>
                            <th>Service Name</th>
                            <th>Container ID</th>
                            <th>Message</th>
                        </tr>
                    </thead>
                    <tbody id="logsBody">
                        <!-- Rows populated by JS -->
                    </tbody>
                </table>
                <div id="loading" class="loading-spinner" style="display: none;"></div>
            </div>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
