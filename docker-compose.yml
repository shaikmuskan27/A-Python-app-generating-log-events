version: '3.8'

services:
  target-app:
    build:
      context: ./target-app
    image: target-app:latest
    container_name: target-app
    ports:
      - "5000:5000"
    restart: unless-stopped

  observer:
    build:
      context: ./observer
    image: observer:latest
    container_name: observer
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - TARGET_CONTAINER=target-app
      - WEBHOOK_URL=http://httpbin.org/post
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - mongodb
    restart: unless-stopped

  api:
    build:
      context: ./api
    image: api:latest
    container_name: api
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - PORT=8080
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    image: frontend:latest
    container_name: frontend
    ports:
      - "8080:80" # Expose the web dashboard on port 8080
    depends_on:
      - api
    restart: unless-stopped

  mongodb:
    image: mongo:6.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
